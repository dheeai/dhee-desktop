# CLA Assistant — asks first-time contributors to sign CLA.md before their PR
# can merge, then remembers their signature forever (one-time, ~30s for them).
#
# Signatures are stored in THIS repo on the `cla-signatures` branch, so the
# built-in GITHUB_TOKEN is sufficient — NO Personal Access Token needed.
# (A PAT is only required when signatures are stored in a separate repo.)
#
# Only setup left: confirm the team GitHub usernames in the `allowlist` below
# (members whose IP is already assigned via employment don't need to sign).

name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/dheeai/dhee-desktop/blob/master/CLA.md'
          branch: 'cla-signatures'
          # Team members with employment IP assignment — they don't sign.
          # VERIFY these usernames before relying on the workflow.
          allowlist: ganarajpr,kiran7893,myadaramsaikiran,*[bot]
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. ✅'
          lock-pullrequest-aftermerge: false
