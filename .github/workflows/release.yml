name: Release
# Injects assets/runtime-config.json: KSHANA_CORE_URL|KSHANA_SERVER_URL → core;
# KSHANA_WEBSITE_URL (repo variable or secret) → kshanaWebsiteUrl (Next.js on Cloud Run).

on:
  push:
    tags:
      - 'v*'

jobs:
  release-mac:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout kshana-desktop
        uses: actions/checkout@v4

      - name: Checkout kshana-core
        uses: actions/checkout@v4
        with:
          repository: anveshane/kshana-core
          path: kshana-core
          token: ${{ secrets.BACKEND_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Build kshana-core
        working-directory: kshana-core
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Install desktop dependencies
        run: |
          npm ci --ignore-scripts
          npx ts-node .erb/scripts/check-native-dep.js
          npm run build:dll

      - name: Inject cloud runtime config
        env:
          KSHANA_CLOUD_SERVER_URL: ${{ secrets.KSHANA_CORE_URL || secrets.KSHANA_SERVER_URL }}
          # Public Next.js site (Cloud Run). Prefer repo variable; optional secret KSHANA_WEBSITE_URL overrides.
          KSHANA_WEBSITE_URL: ${{ vars.KSHANA_WEBSITE_URL || secrets.KSHANA_WEBSITE_URL }}
        run: |
          node << 'EOF'
          const fs = require('fs');
          const backend = process.env.KSHANA_CLOUD_SERVER_URL;
          const website = process.env.KSHANA_WEBSITE_URL;
          const cfg = {};
          if (backend && backend.trim()) {
            cfg.kshanaCoreUrl = backend.trim();
            cfg.cloudServerUrl = backend.trim();
          }
          if (website && website.trim()) {
            cfg.kshanaWebsiteUrl = website.trim().replace(/\/$/, '');
          }
          fs.writeFileSync(
            'assets/runtime-config.json',
            JSON.stringify(cfg, null, 2),
          );
          console.log('Wrote assets/runtime-config.json');
          EOF

      - name: Build and publish Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KSHANA_INK_PATH: ${{ github.workspace }}/kshana-core
        run: npm run release

  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      NODE_OPTIONS: --max-old-space-size=4096

    steps:
      - name: Checkout kshana-desktop
        uses: actions/checkout@v4

      - name: Checkout kshana-core
        uses: actions/checkout@v4
        with:
          repository: anveshane/kshana-core
          path: kshana-core
          token: ${{ secrets.BACKEND_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Build kshana-core
        working-directory: kshana-core
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Install desktop dependencies
        run: |
          npm ci --ignore-scripts
          npx ts-node .erb/scripts/check-native-dep.js
          npm run build:dll

      - name: Inject cloud runtime config
        env:
          KSHANA_CLOUD_SERVER_URL: ${{ secrets.KSHANA_CORE_URL || secrets.KSHANA_SERVER_URL }}
          KSHANA_WEBSITE_URL: ${{ vars.KSHANA_WEBSITE_URL || secrets.KSHANA_WEBSITE_URL }}
        run: |
          $backend = $env:KSHANA_CLOUD_SERVER_URL
          $website = $env:KSHANA_WEBSITE_URL
          $obj = @{}
          if ($backend -and $backend.Trim()) {
            $obj["kshanaCoreUrl"] = $backend.Trim()
            $obj["cloudServerUrl"] = $backend.Trim()
          }
          if ($website -and $website.Trim()) {
            $w = $website.Trim().TrimEnd('/')
            $obj["kshanaWebsiteUrl"] = $w
          }
          $json = $obj | ConvertTo-Json
          Set-Content -Path "assets/runtime-config.json" -Value $json -Encoding UTF8
          Write-Host "Wrote assets/runtime-config.json"

      - name: Build and publish Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KSHANA_INK_PATH: ${{ github.workspace }}\kshana-core
        run: npm run release
