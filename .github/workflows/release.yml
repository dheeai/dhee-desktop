name: Release
# Injects assets/runtime-config.json with public desktop runtime config.

on:
  push:
    tags:
      - 'v*'

jobs:
  release-mac:
    runs-on: macos-14
    permissions:
      contents: write
    env:
      # macOS code signing + notarization (mac job only — CSC_LINK on the
      # Windows job would try to sign the .exe with the mac cert).
      # electron-builder reads CSC_LINK / CSC_KEY_PASSWORD to sign, and (with
      # build.mac.notarize=true) APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD /
      # APPLE_TEAM_ID to notarize via notarytool. Missing secrets => signing /
      # notarizing are skipped (no failure).
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      # electron-builder's built-in notarization reads APPLE_APP_SPECIFIC_PASSWORD.
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASS }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout dhee-desktop
        uses: actions/checkout@v4

      - name: Checkout dhee-core
        uses: actions/checkout@v4
        with:
          repository: dheeai/dhee-core
          path: dhee-core
          token: ${{ secrets.BACKEND_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Build dhee-core
        working-directory: dhee-core
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Install desktop dependencies
        run: |
          npm ci --ignore-scripts
          npx ts-node .erb/scripts/check-native-dep.js
          npm run build:dll

      - name: Inject cloud runtime config
        env:
          # Public Next.js site (Cloud Run). Repo variable wins if both are set; else secret dhee_WEBSITE_URL.
          dhee_WEBSITE_URL: ${{ vars.dhee_WEBSITE_URL || secrets.dhee_WEBSITE_URL }}
          POSTHOG_API_KEY: ${{ vars.POSTHOG_API_KEY || secrets.POSTHOG_API_KEY }}
          POSTHOG_HOST: ${{ vars.POSTHOG_HOST || secrets.POSTHOG_HOST }}
          ANALYTICS_SALT: ${{ vars.ANALYTICS_SALT || secrets.ANALYTICS_SALT }}
        run: node .erb/scripts/write-runtime-config.js

      - name: Build and publish Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          dhee_INK_PATH: ${{ github.workspace }}/dhee-core
        run: npm run release

      - name: Verify packaged app (native unpack + bundles)
        run: node .erb/scripts/verify-packaged-app.js

  release-windows:
    # Runs on the SELF-HOSTED Windows box ("5090") in an interactive desktop
    # session — Certum SimplySign signing needs a real GUI/tray, which
    # GitHub-hosted runners do not have. The runner is scoped to the
    # `simplysign` label and this release workflow only triggers on `v*` tag
    # pushes (never pull_request), so untrusted fork code cannot run here.
    # If the box is offline the job queues until the runner reconnects.
    runs-on: [self-hosted, Windows, simplysign]
    permissions:
      contents: write
    env:
      NODE_OPTIONS: --max-old-space-size=4096
      # Certum cert thumbprint (the sign hook selects this cert from the store).
      WIN_SIGN_SHA1: '362970A533A8C04A3FB4F77AF9EFDF7B80A14D54'
      # SimplySign account id. The OTP seed is NOT here — it is read at runtime
      # from a DPAPI-protected file on the box (see "Authenticate SimplySign").
      CERTUM_USERID: 'indhicdev@gmail.com'

    steps:
      - name: Checkout dhee-desktop
        uses: actions/checkout@v4

      - name: Checkout dhee-core
        uses: actions/checkout@v4
        with:
          repository: dheeai/dhee-core
          path: dhee-core
          token: ${{ secrets.BACKEND_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Build dhee-core
        working-directory: dhee-core
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Install desktop dependencies
        run: |
          npm ci --ignore-scripts
          npx ts-node .erb/scripts/check-native-dep.js
          npm run build:dll

      - name: Inject cloud runtime config
        env:
          dhee_WEBSITE_URL: ${{ vars.dhee_WEBSITE_URL || secrets.dhee_WEBSITE_URL }}
          POSTHOG_API_KEY: ${{ vars.POSTHOG_API_KEY || secrets.POSTHOG_API_KEY }}
          POSTHOG_HOST: ${{ vars.POSTHOG_HOST || secrets.POSTHOG_HOST }}
          ANALYTICS_SALT: ${{ vars.ANALYTICS_SALT || secrets.ANALYTICS_SALT }}
        run: node .erb/scripts/write-runtime-config.js

      # Point the sign hook at the no-admin signtool (NuGet SDK BuildTools) that
      # lives on this box; the runner user isn't admin so the SDK isn't in
      # Program Files. SIGNTOOL_PATH is honored by .erb/scripts/sign-windows.js.
      - name: Resolve signtool
        shell: pwsh
        run: |
          $st = Get-ChildItem 'C:\Users\user\tools\winsdk-buildtools' -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
                Where-Object FullName -like '*x64*' | Select-Object -Last 1 -ExpandProperty FullName
          if (-not $st) { throw 'signtool.exe not found under C:\Users\user\tools\winsdk-buildtools' }
          "SIGNTOOL_PATH=$st" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # Load the SHA256 TOTP seed from the box's DPAPI store (never in GitHub),
      # set it for THIS step only, and drive the SimplySign login. The login
      # script reveals the tray window and foreground-verifies before typing,
      # and short-circuits if a ~2h session is already live.
      - name: Authenticate SimplySign (creds from local DPAPI store)
        shell: pwsh
        run: |
          $sec = Get-Content 'C:\Users\user\.certum\otp_uri.dpapi' | ConvertTo-SecureString
          $env:CERTUM_OTP_URI = [Runtime.InteropServices.Marshal]::PtrToStringAuto([Runtime.InteropServices.Marshal]::SecureStringToBSTR($sec))
          powershell -ExecutionPolicy Bypass -File .erb/scripts/simplysign-login.ps1
          if ($LASTEXITCODE -ne 0) { throw 'SimplySign login failed' }

      - name: Build and publish Electron app (signed inline)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          dhee_INK_PATH: ${{ github.workspace }}\dhee-core
        run: npm run release

      - name: Verify Windows signature
        shell: pwsh
        run: |
          $exe = Get-ChildItem release\build\*.exe | Where-Object Name -like 'Dhee Setup*' | Select-Object -First 1
          & "$env:SIGNTOOL_PATH" verify /pa /v $exe.FullName
          if ($LASTEXITCODE -ne 0) { throw 'signtool verify failed' }

      - name: Verify packaged app (native unpack + bundles)
        run: node .erb/scripts/verify-packaged-app.js

  release-linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      NODE_OPTIONS: --max-old-space-size=4096

    steps:
      - name: Checkout dhee-desktop
        uses: actions/checkout@v4

      - name: Checkout dhee-core
        uses: actions/checkout@v4
        with:
          repository: dheeai/dhee-core
          path: dhee-core
          token: ${{ secrets.BACKEND_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libarchive-tools libfuse2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Build dhee-core
        working-directory: dhee-core
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Install desktop dependencies
        run: |
          npm ci --ignore-scripts
          npx ts-node .erb/scripts/check-native-dep.js
          npm run build:dll

      - name: Inject cloud runtime config
        env:
          dhee_WEBSITE_URL: ${{ vars.dhee_WEBSITE_URL || secrets.dhee_WEBSITE_URL }}
          POSTHOG_API_KEY: ${{ vars.POSTHOG_API_KEY || secrets.POSTHOG_API_KEY }}
          POSTHOG_HOST: ${{ vars.POSTHOG_HOST || secrets.POSTHOG_HOST }}
          ANALYTICS_SALT: ${{ vars.ANALYTICS_SALT || secrets.ANALYTICS_SALT }}
        run: node .erb/scripts/write-runtime-config.js

      - name: Build and publish Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          dhee_INK_PATH: ${{ github.workspace }}/dhee-core
        run: npm run release

      - name: Verify packaged app (native unpack + bundles)
        run: node .erb/scripts/verify-packaged-app.js
