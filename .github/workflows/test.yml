name: Tests

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

# Cancel in-progress runs for the same branch when a new commit lands —
# we only need the latest result.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: jest
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout dhee-desktop
        uses: actions/checkout@v4

      # The desktop loads dhee-core from a local path
      # (release/app/package.json) and `dheeCoreManager.ts` does a
      # `import('dhee-core/runners')` dynamic import; without the
      # sibling dhee-core checkout + built dist, that test suite
      # fails with TS2307. Mirror the layout release.yml uses.
      - name: Checkout dhee-core
        uses: actions/checkout@v4
        with:
          repository: dheeai/dhee-core
          path: dhee-core
          token: ${{ secrets.BACKEND_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # Desktop's own package.json doesn't declare `packageManager`,
      # so pnpm/action-setup needs an explicit version. Pin to the
      # same 10.24.0 release.yml uses.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build dhee-core
        working-directory: dhee-core
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Install desktop dependencies
        run: npm ci

      # `dheeCoreManager.ts` does `import('dhee-core/runners')` — jest's
      # resolution needs that subpath present in node_modules.
      #
      # We CANNOT use `npm install ./dhee-core` here: dhee-core is a pnpm
      # workspace and declares `@dhee/runner-sdk: "workspace:*"`, so npm
      # aborts with `EUNSUPPORTEDPROTOCOL: Unsupported URL Type
      # "workspace:"` while resolving that dep (this is why this job has
      # been red since 0.1.9). We don't need npm to install dhee-core's
      # deps anyway — the `pnpm build` step above already built its dist
      # AND installed its node_modules. We only need the package
      # resolvable, so symlink it into node_modules exactly like local
      # dev does (node_modules/dhee-core -> the checkout). Node resolves
      # dhee-core's own deps from dhee-core/node_modules via realpath.
      - name: Link dhee-core into desktop node_modules
        run: |
          rm -rf node_modules/dhee-core
          ln -s "$GITHUB_WORKSPACE/dhee-core" node_modules/dhee-core
          test -f node_modules/dhee-core/dist/server/runners/index.js \
            && echo "dhee-core/runners dist resolvable via symlink"

      # `setupFiles` in jest config runs check-build-exists.ts which
      # asserts dist/main + dist/renderer are present. Locally these
      # are built by `npm start`; on CI we have to build them up front
      # before jest runs or every suite fails to load.
      - name: Build main + renderer bundles
        run: npm run build

      # The unit + integration jest suite. Playwright e2e specs under
      # tests/e2e/ are excluded by jest's testPathIgnorePatterns; we
      # leave those to a separate workflow if/when they're wired up.
      - name: Run jest
        env:
          dhee_INK_PATH: ${{ github.workspace }}/dhee-core
        run: npx jest
